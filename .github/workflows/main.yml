name: sync to huggingface

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: install huggingface cli
        run: pip install huggingface_hub hf_xet

      - name: push to huggingface space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import os
          from huggingface_hub import HfApi
          
          api = HfApi(token=os.environ["HF_TOKEN"])
          
          api.upload_folder(
              folder_path=".",
              repo_id="gablilli/cartografo",
              repo_type="space",
              ignore_patterns=[".git", ".github", "__pycache__", "*.pyc", ".gitattributes"],
              commit_message="sync from github"
          )
          print("sync completato")
          PYEOF
